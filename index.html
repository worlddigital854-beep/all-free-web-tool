<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Free Web Tools</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #1a73e8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
    </style>
</head>
<body>
    <h1>All Free Web Tools</h1>
    <div class="grid">
        <div class="card"><h3>Text Counter</h3></div>
        <div class="card"><h3>Image Compressor</h3></div>
        <div class="card"><h3>PDF Converter</h3></div>
        <div class="card"><h3>Password Gen</h3></div>
    </div>
</body>
</html>
