<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>All Free Web Tools - Pro Version</title>
    <script src="https://pl30177250.effectivecpmnetwork.com/e5/f6/28/e5f628835d9dab727aa45b00ec2af2ed.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .box { background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #38bdf8; text-align: center; transition: 0.3s; }
        .box:hover { transform: translateY(-5px); background: #334155; }
        input, textarea { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #0f172a; color: white; }
        button { background: #38bdf8; color: #0f172a; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        h1 { color: #38bdf8; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">Professional Web Tools</h1>
    <div class="grid">
        <div class="box"><h3>Text Counter</h3><textarea id="t1" placeholder="Paste text here..."></textarea><button onclick="alert('Words: ' + document.getElementById('t1').value.split(/\s+/).filter(i=>i).length)">Count Words</button></div>
        <div class="box"><h3>Password Gen</h3><button onclick="alert('New Password: ' + Math.random().toString(36).slice(-8) + 'A1!')">Generate</button></div>
        <div class="box"><h3>QR Generator</h3><input id="q1" placeholder="Enter URL..."><button onclick="window.open('https://api.qrserver.com/v1/create-qr-code/?data='+document.getElementById('q1').value)">Create QR</button></div>
        <div class="box"><h3>BMI Calc</h3><input id="h" placeholder="Height (m)"><input id="w" placeholder="Weight (kg)"><button onclick="alert('Your BMI is: ' + (document.getElementById('w').value / (document.getElementById('h').value**2)).toFixed(1))">Calculate</button></div>
        <div class="box"><h3>Text UpperCase</h3><input id="txt1" placeholder="Type text..."><button onclick="alert(document.getElementById('txt1').value.toUpperCase())">Convert</button></div>
        <div class="box"><h3>Char Counter</h3><input id="c1" placeholder="Type here..."><button onclick="alert('Length: ' + document.getElementById('c1').value.length)">Count</button></div>
        <div class="box"><h3>Discount Calc</h3><input id="p1" placeholder="Price"><input id="d1" placeholder="Discount %"><button onclick="alert('Final Price: ' + (document.getElementById('p1').value * (1 - document.getElementById('d1').value/100)))">Calc</button></div>
        <div class="box"><h3>Add Numbers</h3><input id="n1" type="number"><input id="n2" type="number"><button onclick="alert('Sum: ' + (parseFloat(document.getElementById('n1').value) + parseFloat(document.getElementById('n2').value)))">Add</button></div>
        <div class="box"><h3>Sec to Min</h3><input id="s1" placeholder="Seconds"><button onclick="alert((document.getElementById('s1').value/60).toFixed(2) + ' Minutes')">Convert</button></div>
        <div class="box"><h3>Random Num</h3><button onclick="alert('Number: ' + Math.floor(Math.random()*100))">Generate</button></div>
        <div class="box"><h3>Base64 Encode</h3><input id="b1" placeholder="Text..."><button onclick="alert(btoa(document.getElementById('b1').value))">Encode</button></div>
        <div class="box"><h3>Inch to Cm</h3><input id="i1" placeholder="Inches"><button onclick="alert((document.getElementById('i1').value * 2.54) + ' cm')">Convert</button></div>
        <div class="box"><h3>Age Calculator</h3><input id="y1" placeholder="Birth Year"><button onclick="alert('Your Age: ' + (2026 - document.getElementById('y1').value))">Check</button></div>
        <div class="box"><h3>Tip Calculator</h3><input id="bill" placeholder="Bill Amount"><button onclick="alert('10% Tip: ' + (document.getElementById('bill').value * 0.1))">Calc</button></div>
        <div class="box"><h3>Today's Date</h3><button onclick="alert(new Date().toDateString())">Show Date</button></div>
        <div class="box"><h3>C to F</h3><input id="c2" placeholder="Celsius"><button onclick="alert((document.getElementById('c2').value * 9/5 + 32) + ' F')">Convert</button></div>
        <div class="box"><h3>Reverse Text</h3><input id="r1" placeholder="Text..."><button onclick="alert(document.getElementById('r1').value.split('').reverse().join(''))">Reverse</button></div>
        <div class="box"><h3>My Website</h3><button onclick="window.location.href='https://yourwebsite.com'">Visit</button></div>
    </div>
</body>
</html>
