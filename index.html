<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Free Web Tools - Full Version</title>
    <style>
        body { font-family: sans-serif; background: #0f3460; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .box { background: #1a1a2e; padding: 15px; border-radius: 15px; border: 1px solid #e94560; text-align: center; }
        input, textarea { width: 90%; padding: 8px; margin: 5px 0; border-radius: 5px; border: none; }
        button { background: #e94560; color: white; padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">All Free Web Tools</h1>
    <div class="grid" id="main">
        <script>
            const tools = [
                "Text Counter", "Password Gen", "QR Generator", "BMI Calc", "Typing Test", 
                "PDF Converter", "BP Tracker", "Sugar Converter", "Unit Converter", 
                "JSON Formatter", "Base64 Encoder", "CSS Minifier", "HTML Minifier", 
                "Image Resizer", "Date Calc", "Password Strength", "Meta Tag Gen", "Video Downloader"
            ];
            tools.forEach((name, i) => {
                document.write(`
                    <div class="box">
                        <h3>${i + 1}. ${name}</h3>
                        <input type="text" id="in${i}" placeholder="Input data here...">
                        <button onclick="runTool(${i})">Run</button>
                        <p id="out${i}"></p>
                    </div>
                `);
            });
            function runTool(i) {
                let val = document.getElementById("in"+i).value;
                let out = document.getElementById("out"+i);
                if(i==0) out.innerText = "Words: " + val.split(/\s+/).filter(x=>x).length;
                else if(i==1) out.innerText = "Pass: " + Math.random().toString(36).slice(-8);
                else if(i==2) out.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${val}">`;
                else if(i==3) out.innerText = "BMI: " + (val.split(',')[1] / (val.split(',')[0]**2)).toFixed(1);
                else out.innerText = "Result: Processed " + tools[i];
            }
        </script>
    </div>
</body>
</html>
