<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Free Web Tools</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 20px auto; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        #tool-display { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <h1>All Free Web Tools</h1>
    <div class="container">
        <div class="box"><h3>Text Counter</h3><button onclick="showTool('Text Counter Tool Content')">Open</button></div>
        <div class="box"><h3>Image Compressor</h3><button onclick="showTool('Image Compressor Tool Content')">Open</button></div>
    </div>

    <div id="tool-display">
        <h2 id="tool-title">Tool</h2>
        <p id="tool-content">Loading...</p>
        <button onclick="document.getElementById('tool-display').style.display='none'">Close</button>
    </div>

    <script>
        function showTool(name) {
            document.getElementById('tool-title').innerText = name;
            document.getElementById('tool-display').style.display = 'block';
        }
    </script>
</body>
</html>
