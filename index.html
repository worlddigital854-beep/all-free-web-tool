<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Free Web Tools</title>
    <script type="text/javascript" src="https://pl30177250.effectivecpmnetwork.com/e5/f6/28/e5f628835d9dab727aa45b00ec2af2ed.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; text-align: center; }
        input, textarea { width: 90%; padding: 10px; margin: 8px 0; border-radius: 8px; border: none; background: rgba(255, 255, 255, 0.1); color: white; }
        button { width: 92%; padding: 10px; border-radius: 8px; border: none; background: #38bdf8; color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="text-align:center; color:#38bdf8;">All Free Web Tools</h1>
    <div class="grid">

        <div class="card">
            <h3>Text Counter</h3>
            <textarea id="tArea" rows="3"></textarea>
            <button onclick="let t=document.getElementById('tArea').value.trim(); alert('Words: ' + (t===''?0:t.split(/\s+/).filter(w=>w.length>0).length))">Count</button>
        </div>

        <div class="card">
            <h3>BMI Calculator</h3>
            <input type="number" id="h" placeholder="Height(cm)">
            <input type="number" id="w" placeholder="Weight(kg)">
            <button onclick="let h=document.getElementById('h').value/100; let w=document.getElementById('w').value; if(h>0) alert('BMI: '+(w/(h*h)).toFixed(1));">Calculate</button>
        </div>

        <div class="card">
            <h3>QR Generator</h3>
            <input type="text" id="qText" placeholder="Enter URL">
            <button onclick="let t=document.getElementById('qText').value; if(t) document.getElementById('qrRes').innerHTML='<img src=\'https://api.qrserver.com/v1/create-qr-code/?size=100x100&data='+t+'\'>';">Create</button>
            <div id="qrRes" style="margin-top:10px;"></div>
        </div>

        <div class="card">
            <h3>Password Gen</h3>
            <button onclick="alert('Pass: ' + Math.random().toString(36).slice(-8))">Generate</button>
        </div>

        <div class="card">
            <h3>Inch to Cm</h3>
            <input type="number" id="inch" placeholder="Inches">
            <button onclick="alert((document.getElementById('inch').value * 2.54).toFixed(2) + ' cm')">Convert</button>
        </div>

        <div class="card"><h3>C to F</h3><input id="c" placeholder="Celsius"><button onclick="alert((document.getElementById('c').value*9/5+32)+' °F')">Convert</button></div>
        <div class="card"><h3>Age Calc</h3><input id="y" placeholder="Birth Year"><button onclick="alert('Age: '+(2026-document.getElementById('y').value))">Check</button></div>
        <div class="card"><h3>Word Reverse</h3><input id="rev" placeholder="Text"><button onclick="alert(document.getElementById('rev').value.split('').reverse().join(''))">Reverse</button></div>
        <div class="card"><h3>Base64 Encode</h3><input id="b64" placeholder="Text"><button onclick="alert(btoa(document.getElementById('b64').value))">Encode</button></div>
        <div class="card"><h3>JSON Format</h3><textarea id="json"></textarea><button onclick="try{document.getElementById('json').value=JSON.stringify(JSON.parse(document.getElementById('json').value),null,4)}catch(e){alert('Error')}">Format</button></div>

        <div class="card"><h3>Thumbnail</h3><button onclick="window.open('https://youtube.com')">Download</button></div>
        <div class="card"><h3>Hashtag</h3><button onclick="alert('#trending #viral #social')">Generate</button></div>
        <div class="card"><h3>Caption</h3><button onclick="alert('Amazing Post! 🔥')">Generate</button></div>
        <div class="card"><h3>Typing</h3><button onclick="alert('Coming Soon')">Start</button></div>
        <div class="card"><h3>PDF</h3><button onclick="alert('Redirecting...')">Convert</button></div>
        <div class="card"><h3>BP Tracker</h3><button onclick="alert('Saved')">Save</button></div>
        <div class="card"><h3>Sugar</h3><button onclick="alert('Converting')">Convert</button></div>
        <div class="card"><h3>Video DL</h3><button onclick="window.open('https://en.savefrom.net/')">Download</button></div>
    </div>
</body>
</html>
