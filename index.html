<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Free Web Tools</title>

    <script type="text/javascript" src="https://pl30177250.effectivecpmnetwork.com/e5/f6/28/e5f628835d9dab727aa45b00ec2af2ed.js"></script>

    <script type="text/javascript" data-cfasync="false" src="//pl30177250.effectivecpmnetwork.com/e5/f6/28/e5f628835d9dab727aa45b00ec2af2ed.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; margin: 0; }
        h1 { color: #38bdf8; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .box { background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #38bdf8; text-align: center; }
        input, textarea { width: 90%; padding: 10px; margin: 8px 0; border-radius: 5px; border: none; background: #0f172a; color: white; }
        button { background: #38bdf8; color: #0f172a; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>All Free Web Tools</h1>
    <div class="grid">
        <div class="box"><h3>Thumbnail Downloader</h3><input id="url" placeholder="Video URL"><button onclick="window.open('https://img.youtube.com/vi/' + document.getElementById('url').value.split('v=')[1] + '/maxresdefault.jpg')">Download</button></div>
        <div class="box"><h3>Hashtag Generator</h3><input id="h1" placeholder="Topic"><button onclick="alert('#' + document.getElementById('h1').value + ' #viral #trending #socialmedia')">Generate</button></div>
        <div class="box"><h3>Caption Generator</h3><input id="c1" placeholder="Topic"><button onclick="alert('Amazing post about ' + document.getElementById('c1').value + '! 🔥')">Generate</button></div>
        <div class="box"><h3>BMI Calculator</h3><input id="h" placeholder="Height(m)"><input id="w" placeholder="Weight(kg)"><button onclick="let bmi=(document.getElementById('w').value/(document.getElementById('h').value**2)).toFixed(1); alert('BMI: ' + bmi)">Calc</button></div>
        <div class="box"><h3>Typing Test</h3><button onclick="alert('Start typing below...')">Start</button><textarea></textarea></div>
        <div class="box"><h3>QR Generator</h3><input id="q1" placeholder="URL"><button onclick="window.open('https://api.qrserver.com/v1/create-qr-code/?data='+document.getElementById('q1').value)">Create QR</button></div>
        <div class="box"><h3>Base64 Encoder</h3><input id="b1" placeholder="Text"><button onclick="document.getElementById('b1').value = btoa(document.getElementById('b1').value)">Encode</button></div>
        <div class="box"><h3>JSON Formatter</h3><textarea id="j1" placeholder="JSON"></textarea><button onclick="try{let o=JSON.parse(document.getElementById('j1').value); document.getElementById('j1').value=JSON.stringify(o,null,4)}catch(e){alert('Error')}">Format</button></div>
        <div class="box"><h3>Age Calculator</h3><input id="y1" placeholder="Birth Year"><button onclick="alert('Age: ' + (2026 - document.getElementById('y1').value))">Check</button></div>
        <div class="box"><h3>C to F Converter</h3><input id="f1" placeholder="Celsius"><button onclick="alert((document.getElementById('f1').value * 9/5 + 32).toFixed(1) + ' °F')">Convert</button></div>
    </div>
</body>
</html>
