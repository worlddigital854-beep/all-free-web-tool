<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Free Web Tools - Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f3460; color: white; padding: 20px; }
        .tool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .tool-box { 
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 25px; border-radius: 25px; border: 1px solid #e94560;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
        h3 { color: #4ecca3; font-size: 1.2em; }
        button { background: #e94560; color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #ff4d6d; box-shadow: 0 0 15px #e94560; }
    </style>
</head>
<body>
    <h1 style="text-align:center; color: #4ecca3;">All Free Web Tools</h1>
    <div class="tool-grid">
        <script>
            const tools = ["Text Counter", "Password Gen", "QR Generator", "BMI Calc", "Typing Test", "PDF Converter", "BP Tracker", "Sugar Converter", "Unit Converter", "JSON Formatter", "Base64 Encoder", "CSS Minifier", "HTML Minifier", "Image Resizer", "Date Calc", "Password Strength", "Meta Tag Gen", "Video Downloader"];
            tools.forEach((name, i) => {
                document.write(`<div class="tool-box"><h3>${i+1}. ${name}</h3><button>Open Tool</button></div>`);
            });
        </script>
    </div>
</body>
</html>
